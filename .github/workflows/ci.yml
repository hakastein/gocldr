name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor version from go.mod and the latest stable release.
        go: ['1.23', 'stable']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2026.1"
          install-go: false

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: stable

  generate:
    name: generated files are current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rebuild every CLDR table and Intl golden fixture from the pinned data
      # (gen/Dockerfile + gen/package.json) and fail if the committed output
      # drifted. This is the only guard that the generated files still match the
      # data they claim to come from.
      - name: regenerate
        run: make gen

      - name: verify no drift
        run: |
          if ! git diff --quiet; then
            echo "Generated files are out of date. Run 'make gen' and commit the result:"
            git diff --stat
            exit 1
          fi
