name: Feature request or change
description: Suggest an enhancement or a behavioral change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and where does gocldr fall short today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: reference
    attributes:
      label: ECMA-402 / Intl reference
      description: >
        gocldr deliberately follows ECMA-402 `Intl.*` behavior.
        If your request concerns parsing or formatting, please link the
        corresponding upstream behavior so we can keep parity.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
