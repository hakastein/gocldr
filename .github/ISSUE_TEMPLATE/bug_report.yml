name: Bug report
description: Report a defect in gocldr
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Please search existing issues first, and
        include a minimal reproduction — it is by far the most useful thing you
        can provide.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest self-contained Go snippet that reproduces the problem (locale, the input value or time, and the options you passed).
      render: go
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gocldr version or commit
    validations:
      required: true
  - type: input
    id: goversion
    attributes:
      label: Go version (output of `go version`)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Expected vs. actual output, the options you passed (number.Options / datetime.Options fields), the equivalent Intl.* call, or any other context.
    validations:
      required: false
