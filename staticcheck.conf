# Staticcheck configuration — https://staticcheck.dev/docs/configuration/
#
# ST1018 ("string literal contains Unicode format character") is disabled
# project-wide. gocldr's generated CLDR data intentionally contains
# bidirectional-text control characters, including U+2068 (FIRST STRONG ISOLATE)
# and U+2069 (POP DIRECTIONAL ISOLATE) in source and test data — they are domain
# values, not stray invisible characters, so the check would only add noise.
checks = ["all", "-ST1018"]
